<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Learn Lists in HTML</h1>

    <!-- ORDERED LIST -->
    <ol type="1" start="50" reversed>
      <li>HTML</li>
      <li>CSS</li>
      <li>JS</li>
    </ol>

    <!-- UNORDERED LIST -->
    <!-- type = "disc/circle/square" -->
    <ul type="square">
      <li>HTML</li>
      <li>CSS</li>
      <li>JS</li>
    </ul>

    <!-- DESCRIPTION LIST -->
    <dl>
        <!-- description term -->
        <dt>Javascript</dt>

        <!-- description data -->
        <dd>It is a programming language</dd>
    </dl>

  </body>
</html>
